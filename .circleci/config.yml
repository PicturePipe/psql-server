version: 2.1

jobs:
  build-docker-image:
    docker:
      - image: cimg/base:2025.07@sha256:aff996311c7d3ecdf0925f5856d79d5bd2d4773bd2931ef4d65f584e5f0e800c
    steps:
      - checkout
      - attach_workspace:
          at: /home/circleci
      - setup_remote_docker:
          docker_layer_caching: true
      - run: |
          echo "${DOCKER_PASSWORD}" | docker login "${DOCKER_REGISTRY}" -u "${DOCKER_LOGIN}" --password-stdin
          DOCKER_BUILDKIT=1 docker build \
              -t "${DOCKER_REGISTRY}/${DOCKER_REPO}:${CIRCLE_SHA1}" \
                .
          docker push "${DOCKER_REGISTRY}/${DOCKER_REPO}:${CIRCLE_SHA1}"
          if [ "${CIRCLE_BRANCH}" = "master" ]; then
              docker tag "${DOCKER_REGISTRY}/${DOCKER_REPO}:${CIRCLE_SHA1}" "${DOCKER_REGISTRY}/${DOCKER_REPO}:latest"
              docker push "${DOCKER_REGISTRY}/${DOCKER_REPO}:latest"
          fi

workflows:
  version: 2
  lint-test-build:
    jobs:
      - build-docker-image:
          context:
            - quay-push
